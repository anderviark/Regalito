<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>te amo matecito 🌸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 60% 30%, #fff4ec 0%, #fde8d8 45%, #f5d5c5 100%);
    font-family: 'Playfair Display', Georgia, serif;
    overflow: hidden;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .scene {
    position: relative;
    width: 420px;
    height: 520px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 1;
  }

  svg#flower {
    overflow: visible;
    filter: drop-shadow(0 24px 48px rgba(180,80,120,0.18));
  }

  /* Bloom animations */
  .petal-group {
    transform-origin: 210px 310px;
    animation: bloom 1.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
    opacity: 0;
    transform: scale(0.1);
    cursor: pointer;
    transition: filter 0.15s;
  }
  .petal-group:hover { filter: brightness(1.15) drop-shadow(0 0 8px rgba(240,100,160,0.6)); }

  @keyframes bloom {
    0%   { opacity: 0; transform: scale(0.05) rotate(-15deg); }
    60%  { opacity: 1; transform: scale(1.08) rotate(2deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .petal-group:nth-child(1)  { animation-delay: 0.0s; }
  .petal-group:nth-child(2)  { animation-delay: 0.08s; }
  .petal-group:nth-child(3)  { animation-delay: 0.16s; }
  .petal-group:nth-child(4)  { animation-delay: 0.24s; }
  .petal-group:nth-child(5)  { animation-delay: 0.32s; }
  .petal-group:nth-child(6)  { animation-delay: 0.40s; }
  .petal-group:nth-child(7)  { animation-delay: 0.48s; }
  .petal-group:nth-child(8)  { animation-delay: 0.56s; }
  .petal-group:nth-child(9)  { animation-delay: 0.64s; }
  .petal-group:nth-child(10) { animation-delay: 0.72s; }
  .petal-group:nth-child(11) { animation-delay: 0.80s; }
  .petal-group:nth-child(12) { animation-delay: 0.88s; }

  .center-group {
    animation: bloomCenter 1.8s cubic-bezier(0.34,1.56,0.64,1) 0.9s forwards;
    opacity: 0;
    transform-origin: 210px 310px;
    transform: scale(0);
  }
  @keyframes bloomCenter {
    0%   { opacity: 0; transform: scale(0); }
    70%  { opacity: 1; transform: scale(1.1); }
    100% { opacity: 1; transform: scale(1); }
  }

  .stem-group {
    animation: growStem 1.2s ease-out forwards;
    transform-origin: 210px 500px;
    transform: scaleY(0);
  }
  @keyframes growStem {
    0%   { transform: scaleY(0); opacity: 0; }
    100% { transform: scaleY(1); opacity: 1; }
  }

  .leaf-left {
    animation: unfoldLeft 1s ease-out 0.9s forwards;
    opacity: 0;
    transform-origin: 210px 410px;
  }
  .leaf-right {
    animation: unfoldRight 1s ease-out 1.1s forwards;
    opacity: 0;
    transform-origin: 210px 440px;
  }
  @keyframes unfoldLeft {
    0%   { opacity: 0; transform: scale(0) rotate(30deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes unfoldRight {
    0%   { opacity: 0; transform: scale(0) rotate(-30deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .flower-root {
    animation: sway 6s ease-in-out 2.5s infinite;
    transform-origin: 210px 500px;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(0deg); }
    25%       { transform: rotate(1.5deg); }
    75%       { transform: rotate(-1.5deg); }
  }

  /* Petal fly-away animation */
  .petal-fly {
    animation: flyAway 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards !important;
    pointer-events: none !important;
  }
  @keyframes flyAway {
    0%   { opacity: 1; transform: scale(1) translate(var(--fx,0px), var(--fy,0px)) rotate(0deg); }
    40%  { opacity: 0.8; transform: scale(1.2) translate(calc(var(--fx,0px)*3), calc(var(--fy,0px)*3)) rotate(var(--fr,30deg)); }
    100% { opacity: 0; transform: scale(0.3) translate(calc(var(--fx,0px)*8), calc(var(--fy,0px)*8)) rotate(calc(var(--fr,30deg)*3)); }
  }

  /* Sparkles */
  .sparkle {
    animation: sparkle 3s ease-in-out infinite;
    pointer-events: none;
  }
  .sparkle:nth-child(2) { animation-delay: 0.5s; }
  .sparkle:nth-child(3) { animation-delay: 1s; }
  .sparkle:nth-child(4) { animation-delay: 1.5s; }
  .sparkle:nth-child(5) { animation-delay: 2s; }
  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0); }
    50%       { opacity: 0.9; transform: scale(1); }
  }

  /* HUD counter */
  .hud {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(200,100,140,0.3);
    border-radius: 999px;
    padding: 8px 22px;
    font-size: 0.95rem;
    color: #a04060;
    box-shadow: 0 4px 20px rgba(200,80,120,0.12);
    z-index: 100;
    opacity: 0;
    animation: fadeUp 1s ease 2.2s forwards;
  }
  .hud-count {
    font-weight: 700;
    font-size: 1.2rem;
    color: #c04080;
  }

  /* Message when all petals gone */
  .final-msg {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255,240,245,0.92);
    backdrop-filter: blur(10px);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .final-msg.show {
    opacity: 1;
    pointer-events: all;
  }
  .final-msg h2 {
    font-size: 2.4rem;
    font-style: italic;
    color: #b03060;
    text-shadow: 0 2px 20px rgba(200,80,120,0.3);
    margin-bottom: 14px;
    animation: pulse 2s ease-in-out infinite;
  }
  .final-msg p {
    font-size: 1.1rem;
    color: #c06080;
    margin-bottom: 28px;
    font-style: italic;
  }
  .btn-reset {
    background: linear-gradient(135deg, #f06090, #c03060);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 14px 36px;
    font-size: 1.1rem;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(200,60,100,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-reset:hover { transform: scale(1.07); box-shadow: 0 12px 30px rgba(200,60,100,0.45); }
  .btn-reset:active { transform: scale(0.97); }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  h1 {
    margin-top: 16px;
    font-size: 2rem;
    font-style: italic;
    color: #b05070;
    letter-spacing: 0.06em;
    text-align: center;
    text-shadow: 0 2px 12px rgba(200,80,120,0.18);
    opacity: 0;
    animation: fadeUp 1s ease 2s forwards;
    z-index: 1;
    position: relative;
  }

  .hint {
    font-size: 0.78rem;
    color: #c07090;
    font-style: italic;
    opacity: 0;
    animation: fadeUp 1s ease 2.5s forwards;
    margin-top: 6px;
    z-index: 1;
    position: relative;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Particle canvas */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="hud">
  🌸 Pétalos: <span class="hud-count" id="counter">20</span>
</div>

<div class="scene">
<svg id="flower" width="420" height="520" viewBox="0 0 420 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pg1" cx="50%" cy="80%" r="70%">
      <stop offset="0%"   stop-color="#fff0f6"/>

    </radialGradient>
    <radialGradient id="cg" cx="40%" cy="35%" r="65%">

    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6abf70"/>

  <g class="flower-root">

      <path d="M250,405 C245,403 240,400 235,397" stroke="#6abf55" stroke-width="0.7" fill="none" opacity="0.7"/>
      <path d="M262,398 C257,396 252,394 247,391" stroke="#6abf55" stroke-width="0.7" fill="none" opacity="0.7"/>
    </g>

    <!-- Shadow -->
    <ellipse cx="210" cy="322" rx="85" ry="22" fill="rgba(180,60,110,0.12)" filter="url(#softBlur)"/>

    <!-- OUTER PETALS (12) — each has data-petal for JS -->
    <g class="petal-group" data-petal="1" data-angle="0">
      <g transform="translate(210,310) rotate(0)">
        <use href="#petal" transform="translate(0,-60) scale(1.3,1.3)" fill="url(#pg1)" stroke="#c06090" stroke-width="0.7" filter="url(#petalGlow)"/>

<h1>te amo matecito 🌸</h1>
<p class="hint">¡Toca cada pétalo!</p>

<!-- Final message -->
<div class="final-msg" id="finalMsg">
  <h2>💛 ¡La amás!</h2>
  <p>Deshojaste toda la flor, matecito...</p>
  <button class="btn-reset" onclick="resetFlower()">🌱 Volver a florecer</button>
</div>

<script>
  const TOTAL = 20;
  let remaining = TOTAL;
  const counter = document.getElementById('counter');
  const finalMsg = document.getElementById('finalMsg');

  // Particle canvas setup
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  let particles = [];

  class Particle {
    constructor(x, y, color) {
      this.x = x; this.y = y;
      this.color = color;
      this.r = Math.random() * 5 + 3;
      this.vx = (Math.random() - 0.5) * 7;
      this.vy = (Math.random() - 0.5) * 7 - 3;
      this.alpha = 1;
      this.gravity = 0.18;
      this.shape = Math.random() > 0.5 ? 'circle' : 'heart';
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += this.gravity;
      this.alpha -= 0.025;
      this.vx *= 0.98;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.fillStyle = this.color;
      if (this.shape === 'heart') {
        ctx.font = `${this.r * 3}px serif`;
        ctx.fillText('🌸', this.x - this.r, this.y + this.r);
      } else {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  function spawnParticles(x, y) {
    const colors = ['#f2a7c3','#e8759f','#d44f82','#f9d0e8','#fce4b0','#fff0f6','#c94080'];
    for (let i = 0; i < 18; i++) {
      particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
    }
  }

  function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.alpha > 0);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animateParticles);
  }
  animateParticles();

  // Attach events after bloom animations settle
  setTimeout(() => {
    const petals = document.querySelectorAll('[data-petal]');
    petals.forEach(petal => {
      petal.addEventListener('click',    e => removePetal(petal, e));
      petal.addEventListener('touchstart', e => { e.preventDefault(); removePetal(petal, e.touches[0]); }, { passive: false });
    });
  }, 2000);

  function removePetal(el, event) {
    if (el.classList.contains('petal-fly') || el.style.display === 'none') return;

    // Get screen coordinates for particles
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    // Fly direction = outward from flower center
    const angle = parseFloat(el.dataset.angle || '0') * Math.PI / 180;
    const fx = Math.sin(angle) * 30;
    const fy = -Math.cos(angle) * 30;
    const fr = (Math.random() - 0.5) * 120;

    el.style.setProperty('--fx', fx + 'px');
    el.style.setProperty('--fy', fy + 'px');
    el.style.setProperty('--fr', fr + 'deg');
    el.classList.add('petal-fly');

    spawnParticles(cx, cy);

    setTimeout(() => { el.style.display = 'none'; }, 820);

    remaining--;
    counter.textContent = remaining;

    if (remaining <= 0) {
      setTimeout(() => { finalMsg.classList.add('show'); }, 900);
    }
  }

  function resetFlower() {
    finalMsg.classList.remove('show');
    remaining = TOTAL;
    counter.textContent = TOTAL;

    const petals = document.querySelectorAll('[data-petal]');
    petals.forEach(el => {
      el.style.display = '';
      el.classList.remove('petal-fly');
      el.style.removeProperty('--fx');
      el.style.removeProperty('--fy');
      el.style.removeProperty('--fr');
      // Trigger reflow to restart animation
      void el.offsetWidth;
    });
  }
</script>
</body>
